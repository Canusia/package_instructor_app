<div class="tab-pane" id="course_administrators">
    <script>

    </script>
    <div class="bg-white border border-top-0">
        <div class="card border-top-0">
            <div class="card-body">
                <table id="table_course_administrator" class="table table-striped responsive"
                    style="width:100%">
                    <thead>
                        <tr>
                            <th data-data="course.name" data-name="course.name">Course</th>
                            <th data-data="user.last_name" data-name="user.last_name">Last Name

        </div>
    </div>

</div>

<script>
    function do_req_bulk_action(action, dt) {
        if(dt != '-1') {
            if(!dt.rows('.selected').any()) {
                alert("Please select a row and try again.")
                return
            }

            var selectedRows = dt.rows({ selected: true });
            var data = {
                'action': action,
                'ids': Array()
            }
            selectedRows.every(function() {
                data.ids.push(this.id())
            })

            $(dt).block()
        } else {
            var data = {
                'action': action,
                'ids': Array()
            }
        }

        url = "{{course_req_bulk_actions_url}}"
        let modal = "modal-bulk_actions"

        $.blockUI();
        $.ajax({
            type: "GET",
            url: url,
            data: data,
            success: function(response) {
                $.unblockUI();

                if(response.action == 'display') {
                    var span = document.createElement('span')
                    span.innerHTML = response.message
                    swal({
                        title: response.title,
                        content: span,
                        icon: response.status
                    });

                    var selectedRows = table_course_requirements.rows({ selected: true });
                    selectedRows.deselect();

                    table_course_requirements.ajax.reload(null, false)
                } else {
                    $("#bulk_modal_content").html(response);
                    $("#" + modal).modal('show');
                }
            }
        });
    }

    $(document).ready(function () {

        table_course_requirements = $('#table_course_requirements')
            .DataTable({initComplete: function () {
                    this.api()
                        .columns()
                        .every(function () {
                            let column = this;
                            let title = column.footer().textContent;

                            // Create input element
                            if(title != '') {
                                let input = document.createElement('input');
                                input.className = 'form-control'
                                input.placeholder = "Search " + title;

                                column.footer().replaceChildren(input);

                                // Event listener for user input
                                input
                                .addEventListener('keyup', $.debounce(1500,() => {
                                    if (column.search() !== this.value) {
                                        column.search(input.value).draw();
                                    }
                                }));
                            }
                        });


                    // Restore state
                    var state = this.api().state.loaded();
                    if (state) {
                        this.api().columns().eq(0).each(function (colIdx) {
                            var colSearch = state.columns[colIdx].search;

                            if (colSearch.search) {
                                $('input', this.column(colIdx).footer()).val(colSearch.search);
                            }
                        });
                    }
                },
                searchDelay: 1500,
                columnDefs: [
                    {
                        orderable: false,
                        className: 'select-checkbox',
                        targets: 0
                    }
                ],
                select: {
                    style: 'os',
                    selector: 'td:first-child'
                },
                dom: 'B<"float-left mt-3 mb-3"l><"float-right mt-3"f><"row clear">rt<"row"<"col-6"i><"col-6 float-right"p>>',
                buttons: [
                    {
                        extend: 'csv', className: 'btn btn-sm btn-primary text-white text-light',
                        text: '<i class="fas fa-file-csv text-white"></i>&nbsp;CSV',
                        titleAttr: 'Export results to CSV'
                    },
                    {
                        extend: 'print', className: 'btn btn-sm btn-primary text-white text-light',
                        text: '<i class="fas fa-print text-white"></i>&nbsp;Print',
                        titleAttr: 'Print'
                    },
                    {
                        className: 'btn btn-sm btn-primary text-light',
                        text: '<i class="fas fa-plus text-white"></i>&nbsp;Add New',
                        titleAttr: 'Add New',
                        action: function ( e, dt, node, config ) {
                            do_req_bulk_action('add_new_req', '-1')
                        }
                    },
                    {
                        className: 'btn btn-sm btn-primary text-light',
                        text: '<i class="fas fa-edit text-white"></i>&nbsp;Update',
                        titleAttr: 'Update',
                        action: function ( e, dt, node, config ) {
                            do_req_bulk_action('update_req_status', dt)
                        }
                    },
                    {
                        className: 'btn btn-sm btn-primary text-light',
                        text: '<i class="fas fa-trash text-white"></i>&nbsp;Delete',
                        titleAttr: 'Delete',
                        action: function ( e, dt, node, config ) {
                            do_req_bulk_action('delete_req', dt)
                        }
                    },
                ],
                rowId: 'id',
                ajax: '{{course_requirements_url}}',
                serverSide: true,
                processing: true,
                stateSave: true,
                'lengthMenu': [30, 50, 100],
                'order': [[1, 'asc']],
                'columns': [
                {
                        'searchable': false,
                        'orderable': false,
                        'render': function (data, type, row, meta) {
                            return ''
                        }
                    },
                    null,
                    null,
                    {
                        'searchable': false,
                        'orderable': false,
                        'render': function (data, type, row, meta) {
                            if(row.required == '1') {
                                return "Yes"
                            } else {
                                return "No"
                            }
                        }
                    },
                    null,
                    {
                        'searchable': false,
                        'orderable': false,
                        'render': function (data, type, row, meta) {
                            return "<a class='btn btn-sm btn-primary  record-details' refresh-target='table_course_requirements' href='" + "{{urls.details_prefix}}" + row.course.id + "#app_documents'>View Details</a>"
                        }
                    }
                ]
            }
        );

        table_course_administrator = $('#table_course_administrator')
           .DataTable({
                dom: 'B<"float-left mt-3 mb-3"l><"float-right mt-3"f><"row clear">rt<"row"<"col-6"i><"col-6 float-right"p>>',
                buttons: [
                    {
                        extend: 'csv', className: 'btn btn-sm btn-primary text-white text-light',
                        text: '<i class="fas fa-file-csv text-white"></i>&nbsp;CSV',
                        titleAttr: 'Export results to CSV'
                    },
                    {
                        extend: 'print', className: 'btn btn-sm btn-primary text-white text-light',
                        text: '<i class="fas fa-print text-white"></i>&nbsp;Print',
                        titleAttr: 'Print'
                    },
                ],
                ajax: '{{course_administrator_url}}',
                serverSide: true,
                processing: true,
                stateSave: true,
                'lengthMenu': [30, 50, 100],
                'order': [[0, 'asc']],
                'columns': [

                    null,
                    null,
                    null,
                    null,
                    null,
                    null,
                    {
                        'searchable': false,
                        'orderable': false,
                        'render': function (data, type, row, meta) {
                            return "<a class='btn btn-sm btn-primary  record-details' refresh-target='table_course_administrator' href='" + "{{urls.details_prefix}}" + row.course.id + "#administrators'>View Details</a>"
                        }
                    }
                ]
            }
        );
    });
</script>
